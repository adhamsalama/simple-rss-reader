<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RSS Reader for Kindle</title>
    <link rel="stylesheet" href="./css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@mozilla/readability@0.5.0/Readability.min.js"></script>
    <script type="text/javascript" src="https://stuk.github.io/jszip/dist/jszip.js"></script>

    <script type="text/javascript" src="//stuk.github.io/jszip-utils/dist/jszip-utils.js"></script>
</head>

<body>
    <div id="scroll-buttons" class="scroll-buttons hidden">
        <button id="scroll-up-btn" class="scroll-btn" onclick="scrollPage(-1)">^</button>
        <button id="scroll-down-btn" class="scroll-btn" onclick="scrollPage(1)">v</button>
    </div>
    <div class="container">
        <div class="controls">
            <div class="control-row">
                <div class="control-group">
                    <span class="control-label">Font:</span>
                    <button onclick="adjustFontSize(-2)" aria-label="Decrease font size">
                        A-
                    </button>
                    <button onclick="adjustFontSize(2)" aria-label="Increase font size">
                        A+
                    </button>
                </div>
                <div class="control-group">
                    <span class="control-label">Spacing:</span>
                    <button onclick="adjustSpacing(-1)" aria-label="Decrease spacing">
                        -
                    </button>
                    <button onclick="adjustSpacing(1)" aria-label="Increase spacing">
                        +
                    </button>
                </div>
                <div class="control-group">
                    <span class="control-label">Line:</span>
                    <button onclick="adjustLineHeight(-0.1)" aria-label="Decrease line height">
                        -
                    </button>
                    <button onclick="adjustLineHeight(0.1)" aria-label="Increase line height">
                        +
                    </button>
                </div>
            </div>
        </div>

        <div id="input-view" class="active">
            <div class="feed-input-section">
                <label for="feed-url"><strong>Enter RSS Feed URL:</strong></label>
                <input type="text" id="feed-url" placeholder="https://example.com/feed.xml" />
                <button onclick="loadFeed()">Load Feed</button>
                <button class="secondary" onclick="saveCurrentFeed()">
                    Save Feed
                </button>
                <button class="secondary" onclick="toggleSavedFeeds()">
                    Saved Feeds
                </button>
                <div id="render-progress" style="display: inline" class="loading">
                    0/0
                </div>
            </div>
            <div id="input-error" class="error hidden"></div>
            <div id="saved-feeds-section" class="saved-feeds-section hidden">
                <ul id="saved-feeds-list" class="saved-feeds-list"></ul>
            </div>
        </div>

        <div id="feed-view">
            <h2 id="feed-title">Feed Articles</h2>
            <div class="nav-buttons" id="normal-nav-buttons" style="display: flex;">
                <button onclick="startArticleSelection('text')">Download All (text)</button>
                <button onclick="startArticleSelection('mobi')">Download All (MOBI)</button>
            </div>
            <div class="nav-buttons" id="selection-nav-buttons" style="display: none;">
                <button onclick="downloadSelectedArticles()" class="primary">Download Selected</button>
                <button onclick="cancelArticleSelection()" class="secondary">Cancel</button>
                <span style="margin-left: 15px; font-weight: bold;">Selected: <span id="selection-count">0</span>
                    articles</span>
            </div>
            <hr />
            <div id="feed-loading" class="loading hidden">Loading feed...</div>
            <div id="download-all-progress" class="loading hidden">Downloading articles...</div>
            <ul id="article-list" class="article-list"></ul>
        </div>

        <div id="article-view">
            <div class="nav-buttons">
                <button class="secondary" onclick="showFeedView()">
                    Back to List
                </button>
                <button onclick="fetchFullArticle()">Get Full Article</button>
                <button onclick="downloadArticle()">Download (text)</button>
                <button id="download-mobi-btn">Download (MOBI)</button>
                <button id="download-epub-btn">Download (EPUB)</button>
                <button id="view-comments-btn" style="display: none">
                    View Comments
                </button>
                <button id="view-comments-html-btn" style="display: none">
                    View Comments HTML
                </button>
            </div>
            <div id="article-loading" class="loading hidden">
                Loading article...
            </div>
            <div id="article-content" class="article-content visible"></div>
            <div id="comments-loading" class="loading hidden">
                Loading comments...
            </div>
            <div id="comments-content" class="article-content"></div>
            <div id="comments-html-content" class="article-content"></div>
        </div>
    </div>

    <!-- Existing lib -->
    <script src="./js/lib/utils.js"></script>
    <script src="./js/lib/googleNewsDecoder.js"></script>
    <script src="./js/lib/mobiWriter.js"></script>
    <script src="./js/lib/epubWriter.js"></script>

    <!-- Core (no dependencies) -->
    <script src="./js/core/config.js"></script>
    <script src="./js/core/state.js"></script>

    <!-- Utils -->
    <script src="./js/utils/urlHelpers.js"></script>

    <!-- UI -->
    <script src="./js/ui/controls.js"></script>
    <script src="./js/ui/viewManager.js"></script>
    <script src="./js/ui/scrollControls.js"></script>

    <!-- Articles -->
    <script src="./js/articles/articleFetcher.js"></script>
    <script src="./js/articles/articleViewer.js"></script>
    <script src="./js/articles/comments.js"></script>

    <!-- Downloads -->
    <script src="./js/downloads/textDownloader.js"></script>
    <script src="./js/downloads/mobiDownloader.js"></script>
    <script src="./js/downloads/epubDownloader.js"></script>

    <!-- Feeds -->
    <script src="./js/feeds/savedFeeds.js"></script>
    <script src="./js/feeds/feedRenderer.js"></script>
    <script src="./js/feeds/feedLoader.js"></script>

    <!-- Article selection -->
    <script src="./js/articles/articleSelection.js"></script>

    <!-- Event handlers & initialization -->
    <script src="./js/eventHandlers.js"></script>
    <script src="./js/app.js"></script>
</body>

</html>
