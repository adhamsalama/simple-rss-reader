<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RSS Reader for Kindle</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Georgia, serif;
            background-color: #fff;
            color: #000;
            line-height: 1.5;
            padding: 10px;
            font-size: 16px;
            letter-spacing: 0px;
            word-spacing: 0px;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
        }

        h1 {
            font-size: 1.4em;
            margin-bottom: 15px;
            border-bottom: 2px solid #000;
            padding-bottom: 5px;
        }

        h2 {
            font-size: 1.2em;
            margin-bottom: 10px;
        }

        .controls {
            margin-bottom: 15px;
            padding: 10px;
            border: 1px solid #000;
            background-color: #f5f5f5;
        }

        .control-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 10px;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .control-label {
            font-size: 0.9em;
            font-weight: bold;
        }

        button {
            font-family: Georgia, serif;
            font-size: 1em;
            padding: 8px 15px;
            background-color: #000;
            color: #fff;
            border: none;
            cursor: pointer;
            min-width: 40px;
        }

        button:active {
            background-color: #333;
        }

        button.secondary {
            background-color: #fff;
            color: #000;
            border: 2px solid #000;
        }

        button.secondary:active {
            background-color: #ddd;
        }

        input[type="text"] {
            font-family: Georgia, serif;
            font-size: 1em;
            padding: 8px;
            border: 2px solid #000;
            width: 100%;
            margin-bottom: 10px;
        }

        .feed-input-section {
            margin-bottom: 15px;
        }

        .article-list {
            list-style: none;
        }

        .article-item {
            padding: 10px 0;
            border-bottom: 1px solid #ccc;
        }

        .article-title {
            font-size: 1.1em;
            font-weight: bold;
            color: #000;
            text-decoration: underline;
            cursor: pointer;
            display: block;
            margin-bottom: 5px;
        }

        .article-title:active {
            background-color: #ddd;
        }

        .article-meta {
            font-size: 0.85em;
            color: #444;
        }

        .article-description {
            font-size: 0.95em;
            margin-top: 5px;
            color: #333;
        }

        .article-content {
            display: none;
            padding: 15px;
            border: 1px solid #000;
            margin-top: 15px;
            background-color: #fafafa;
        }

        .article-content.visible {
            display: block;
        }

        .article-content h1,
        .article-content h2,
        .article-content h3 {
            margin: 15px 0 10px 0;
        }

        .article-content p {
            margin-bottom: 10px;
            text-align: justify;
        }

        .article-content img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 10px 0;
        }

        .back-btn {
            margin-bottom: 15px;
        }

        .loading {
            padding: 20px;
            text-align: center;
            font-style: italic;
        }

        .error {
            padding: 15px;
            background-color: #f5f5f5;
            border: 2px solid #000;
            margin: 10px 0;
        }

        .hidden {
            display: none;
        }

        #feed-view,
        #article-view {
            display: none;
        }

        #feed-view.active,
        #article-view.active {
            display: block;
        }

        #input-view.active {
            display: block;
        }

        .nav-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .saved-feeds-section {
            margin-top: 15px;
            padding: 10px;
            border: 1px solid #ccc;
            background-color: #f9f9f9;
        }

        .saved-feeds-section.hidden {
            display: none;
        }

        .saved-feeds-list {
            list-style: none;
        }

        .saved-feed-item {
            padding: 8px 0;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .saved-feed-link {
            flex: 1;
            text-decoration: underline;
            cursor: pointer;
            color: #000;
        }

        .saved-feed-link:active {
            background-color: #ddd;
        }

        .delete-feed-btn {
            padding: 4px 8px;
            font-size: 0.85em;
            min-width: auto;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@mozilla/readability@0.5.0/Readability.min.js"></script>
    <script type="text/javascript" src="https://stuk.github.io/jszip/dist/jszip.js"></script>

    <script type="text/javascript" src="//stuk.github.io/jszip-utils/dist/jszip-utils.js"></script>
</head>

<body>
    <div class="container">
        <h1>RSS Reader</h1>

        <div class="controls">
            <div class="control-row">
                <div class="control-group">
                    <span class="control-label">Font:</span>
                    <button onclick="adjustFontSize(-2)" aria-label="Decrease font size">
                        A-
                    </button>
                    <button onclick="adjustFontSize(2)" aria-label="Increase font size">
                        A+
                    </button>
                </div>
                <div class="control-group">
                    <span class="control-label">Spacing:</span>
                    <button onclick="adjustSpacing(-1)" aria-label="Decrease spacing">
                        -
                    </button>
                    <button onclick="adjustSpacing(1)" aria-label="Increase spacing">
                        +
                    </button>
                </div>
                <div class="control-group">
                    <span class="control-label">Line:</span>
                    <button onclick="adjustLineHeight(-0.1)" aria-label="Decrease line height">
                        -
                    </button>
                    <button onclick="adjustLineHeight(0.1)" aria-label="Increase line height">
                        +
                    </button>
                </div>
            </div>
        </div>

        <div id="input-view" class="active">
            <div class="feed-input-section">
                <label for="feed-url"><strong>Enter RSS Feed URL:</strong></label>
                <input type="text" id="feed-url" placeholder="https://example.com/feed.xml" />
                <button onclick="loadFeed()">Load Feed</button>
                <button class="secondary" onclick="saveCurrentFeed()">
                    Save Feed
                </button>
                <button class="secondary" onclick="toggleSavedFeeds()">
                    Saved Feeds
                </button>
                <div id="render-progress" style="display: inline" class="loading">
                    0/0
                </div>
            </div>
            <div id="input-error" class="error hidden"></div>
            <div id="saved-feeds-section" class="saved-feeds-section hidden">
                <ul id="saved-feeds-list" class="saved-feeds-list"></ul>
            </div>
        </div>

        <div id="feed-view">
            <div class="nav-buttons">
                <button class="secondary" onclick="showInputView()">New Feed</button>
            </div>
            <h2 id="feed-title">Feed Articles</h2>
            <hr />
            <div id="feed-loading" class="loading hidden">Loading feed...</div>
            <ul id="article-list" class="article-list"></ul>
        </div>

        <div id="article-view">
            <div class="nav-buttons">
                <button class="secondary" onclick="showFeedView()">
                    Back to List
                </button>
                <button onclick="fetchFullArticle()">Get Full Article</button>
                <button onclick="downloadArticle()">Download</button>
                <button id="download-mobi-btn">Download as MOBI</button>
                <button id="view-comments-btn" style="display: none">
                    View Comments
                </button>
                <button id="view-comments-html-btn" style="display: none">
                    View Comments HTML
                </button>
            </div>
            <div id="article-loading" class="loading hidden">
                Loading article...
            </div>
            <div id="article-content" class="article-content visible"></div>
            <div id="comments-loading" class="loading hidden">
                Loading comments...
            </div>
            <div id="comments-content" class="article-content"></div>
            <div id="comments-html-content" class="article-content"></div>
        </div>
    </div>

    <script>
        // Global error handler
        window.onerror = function (message, source, lineno, colno, error) {
            alert("Error: " + message + "\nLine: " + lineno);
            return false;
        };

        /**
         * MobiWriter.js - ES3 JavaScript port of MobiWriter
         * Minimal writer for the Mobipocket (.mobi) format
         *
         * Usage:
         *   var book = new MobiBook("Title", "Author");
         *   book.setHtmlContent("<html><body>Hello World</body></html>");
         *   var writer = new MobiWriter();
         *   writer.write(book, "output.mobi"); // triggers download in browser
         */

        (function (global) {
            "use strict";

            // ============================================================
            // Utils
            // ============================================================

            var Utils = {};

            Utils.swapEndian16 = function (x) {
                return ((x >> 8) & 0xff) | ((x << 8) & 0xff00);
            };

            Utils.swapEndian32 = function (x) {
                return (
                    ((x >>> 24) & 0xff) |
                    ((x >>> 8) & 0xff00) |
                    ((x << 8) & 0xff0000) |
                    ((x << 24) & 0xff000000)
                );
            };

            Utils.stringToBytes = function (str, bytes, offset) {
                offset = offset || 0;
                for (var i = 0; i < str.length; i++) {
                    bytes[offset + i] = str.charCodeAt(i) & 0xff;
                }
            };

            Utils.ushortToBytes = function (x, bytes, offset, swapEndian) {
                if (swapEndian !== false) {
                    x = Utils.swapEndian16(x);
                }
                bytes[offset] = x & 0xff;
                bytes[offset + 1] = (x >> 8) & 0xff;
            };

            Utils.uintToBytes = function (x, bytes, offset, swapEndian) {
                // Handle large numbers that exceed 32-bit signed int
                x = x >>> 0; // Convert to unsigned 32-bit
                if (swapEndian !== false) {
                    x = Utils.swapEndian32(x);
                }
                bytes[offset] = x & 0xff;
                bytes[offset + 1] = (x >> 8) & 0xff;
                bytes[offset + 2] = (x >> 16) & 0xff;
                bytes[offset + 3] = (x >>> 24) & 0xff;
            };

            Utils.getFourBytesPadding = function (size) {
                var padding = 4 - (size % 4);
                if (padding === 4) {
                    return 0;
                }
                return padding;
            };

            Utils.createByteArray = function (size) {
                var arr = [];
                for (var i = 0; i < size; i++) {
                    arr[i] = 0;
                }
                return arr;
            };

            Utils.concatByteArrays = function () {
                var totalLength = 0;
                var i, j;
                for (i = 0; i < arguments.length; i++) {
                    totalLength += arguments[i].length;
                }
                var result = [];
                var offset = 0;
                for (i = 0; i < arguments.length; i++) {
                    for (j = 0; j < arguments[i].length; j++) {
                        result[offset++] = arguments[i][j];
                    }
                }
                return result;
            };

            Utils.byteArrayToString = function (bytes) {
                var str = "";
                for (var i = 0; i < bytes.length; i++) {
                    str += String.fromCharCode(bytes[i]);
                }
                return str;
            };

            Utils.stringToByteArray = function (str) {
                var bytes = [];
                for (var i = 0; i < str.length; i++) {
                    bytes[i] = str.charCodeAt(i) & 0xff;
                }
                return bytes;
            };

            // UTF-8 encode a string to byte array
            Utils.utf8Encode = function (str) {
                var bytes = [];
                for (var i = 0; i < str.length; i++) {
                    var c = str.charCodeAt(i);
                    if (c < 0x80) {
                        bytes.push(c);
                    } else if (c < 0x800) {
                        bytes.push(0xc0 | (c >> 6));
                        bytes.push(0x80 | (c & 0x3f));
                    } else if (c < 0xd800 || c >= 0xe000) {
                        bytes.push(0xe0 | (c >> 12));
                        bytes.push(0x80 | ((c >> 6) & 0x3f));
                        bytes.push(0x80 | (c & 0x3f));
                    } else {
                        // Surrogate pair
                        i++;
                        c = 0x10000 + (((c & 0x3ff) << 10) | (str.charCodeAt(i) & 0x3ff));
                        bytes.push(0xf0 | (c >> 18));
                        bytes.push(0x80 | ((c >> 12) & 0x3f));
                        bytes.push(0x80 | ((c >> 6) & 0x3f));
                        bytes.push(0x80 | (c & 0x3f));
                    }
                }
                return bytes;
            };

            // ============================================================
            // EofRecord
            // ============================================================

            function EofRecord() {
                this.size_ = 4;
                this.data_ = null;
            }

            EofRecord.prototype.generate = function () {
                this.data_ = [0xe9, 0x8e, 0x0d, 0x0a];
                return true;
            };

            EofRecord.prototype.data = function () {
                return this.data_;
            };

            EofRecord.prototype.size = function () {
                return this.size_;
            };

            // ============================================================
            // ExthHeader
            // ============================================================

            var EXTH_AUTHOR = 100;
            var EXTH_CREATOR_SOFTWARE = 204;
            var EXTH_CREATOR_MAJOR_VERSION = 205;
            var EXTH_CREATOR_MINOR_VERSION = 206;
            var EXTH_CREATOR_BUILD_NUMBER = 207;

            function ExthHeader() {
                this.size_ = 12; // sizeof ExthHeaderStruct (4 + 4 + 4)
                this.data_ = null;
                this.records_ = [];
            }

            ExthHeader.prototype.addRecord = function (type, dataBytes) {
                var recordHeader = Utils.createByteArray(8);
                Utils.uintToBytes(type, recordHeader, 0);
                Utils.uintToBytes(dataBytes.length + 8, recordHeader, 4);

                var recordData = Utils.concatByteArrays(recordHeader, dataBytes);
                this.size_ += recordData.length;
                this.records_.push(recordData);
            };

            ExthHeader.prototype.generate = function () {
                // Add creator software records
                var creatorSoftware = Utils.createByteArray(4);
                Utils.uintToBytes(201, creatorSoftware, 0);
                this.addRecord(EXTH_CREATOR_SOFTWARE, creatorSoftware);

                var creatorMajor = Utils.createByteArray(4);
                Utils.uintToBytes(1, creatorMajor, 0);
                this.addRecord(EXTH_CREATOR_MAJOR_VERSION, creatorMajor);

                var creatorMinor = Utils.createByteArray(4);
                Utils.uintToBytes(2, creatorMinor, 0);
                this.addRecord(EXTH_CREATOR_MINOR_VERSION, creatorMinor);

                var creatorBuild = Utils.createByteArray(4);
                Utils.uintToBytes(33307, creatorBuild, 0);
                this.addRecord(EXTH_CREATOR_BUILD_NUMBER, creatorBuild);

                // Build header
                var header = Utils.createByteArray(12);
                Utils.stringToBytes("EXTH", header, 0);
                Utils.uintToBytes(this.size_, header, 4);
                Utils.uintToBytes(this.records_.length, header, 8);

                this.data_ = header;
                for (var i = 0; i < this.records_.length; i++) {
                    this.data_ = Utils.concatByteArrays(this.data_, this.records_[i]);
                }

                // Add padding
                var padding = Utils.getFourBytesPadding(this.data_.length);
                for (var j = 0; j < padding; j++) {
                    this.data_.push(0);
                }
                this.size_ += padding;

                return this.data_.length === this.size_;
            };

            ExthHeader.prototype.data = function () {
                return this.data_;
            };

            ExthHeader.prototype.size = function () {
                return this.size_;
            };

            // ============================================================
            // MobiHeader
            // ============================================================

            var MOBI_HEADER_SIZE = 232; // Size of MobiHeaderStruct

            function MobiHeader() {
                this.size_ = MOBI_HEADER_SIZE;
                this.data_ = null;
            }

            MobiHeader.prototype.generate = function (
                textEncoding,
                palmDbHeaderLength,
                palmDocHeaderLength,
                exthHeaderLength,
                bookTitleLength,
                locale,
                textRecordsCount,
            ) {
                var header = Utils.createByteArray(MOBI_HEADER_SIZE);
                var offset = 0;

                // identifier (4 bytes)
                Utils.stringToBytes("MOBI", header, offset);
                offset += 4;

                // header_length (4 bytes)
                Utils.uintToBytes(this.size_, header, offset);
                offset += 4;

                // mobi_file_type (4 bytes) - 2 = Mobipocket book
                Utils.uintToBytes(2, header, offset);
                offset += 4;

                // text_encoding (4 bytes)
                Utils.uintToBytes(textEncoding, header, offset);
                offset += 4;

                // unique_id (4 bytes)
                Utils.uintToBytes(2596053606, header, offset); // Truncated from original
                offset += 4;

                // mobi_file_version (4 bytes)
                Utils.uintToBytes(5, header, offset);
                offset += 4;

                // orthographic_index (4 bytes) - 0xFFFFFFFF = not present
                Utils.uintToBytes(0xffffffff, header, offset, false);
                offset += 4;

                // inflection_index (4 bytes)
                Utils.uintToBytes(0xffffffff, header, offset, false);
                offset += 4;

                // index_names (4 bytes)
                Utils.uintToBytes(0xffffffff, header, offset, false);
                offset += 4;

                // index_keys (4 bytes)
                Utils.uintToBytes(0xffffffff, header, offset, false);
                offset += 4;

                // extra_index_0 through extra_index_5 (24 bytes)
                for (var i = 0; i < 6; i++) {
                    Utils.uintToBytes(0xffffffff, header, offset, false);
                    offset += 4;
                }

                // first_non_book_index (4 bytes)
                Utils.uintToBytes(textRecordsCount + 1, header, offset);
                offset += 4;

                // book_title_offset (4 bytes)
                var bookTitleOffset =
                    palmDocHeaderLength + MOBI_HEADER_SIZE + exthHeaderLength;
                Utils.uintToBytes(bookTitleOffset, header, offset);
                offset += 4;

                // book_title_length (4 bytes)
                Utils.uintToBytes(bookTitleLength, header, offset);
                offset += 4;

                // locale (4 bytes)
                Utils.uintToBytes(locale, header, offset);
                offset += 4;

                // dictionary_input_language (4 bytes)
                Utils.uintToBytes(0, header, offset);
                offset += 4;

                // dictionary_output_language (4 bytes)
                Utils.uintToBytes(0, header, offset);
                offset += 4;

                // minimum_mobipocket_version (4 bytes)
                Utils.uintToBytes(6, header, offset);
                offset += 4;

                // first_image_index (4 bytes)
                Utils.uintToBytes(textRecordsCount + 1, header, offset);
                offset += 4;

                // huffman_record_offset (4 bytes)
                Utils.uintToBytes(0, header, offset);
                offset += 4;

                // huffman_record_count (4 bytes)
                Utils.uintToBytes(0, header, offset);
                offset += 4;

                // huffman_table_offset (4 bytes)
                Utils.uintToBytes(0, header, offset);
                offset += 4;

                // huffman_table_length (4 bytes)
                Utils.uintToBytes(0, header, offset);
                offset += 4;

                // exth_flags (4 bytes) - 0b1010000 = 80
                Utils.uintToBytes(80, header, offset);
                offset += 4;

                // unknown_bytes_0 (32 bytes) - already zeroed
                offset += 32;

                // drm_offset (4 bytes) - 0xFFFFFFFF = no DRM
                Utils.uintToBytes(0xffffffff, header, offset, false);
                offset += 4;

                // drm_count (4 bytes)
                Utils.uintToBytes(0xffffffff, header, offset, false);
                offset += 4;

                // drm_size (4 bytes)
                Utils.uintToBytes(0, header, offset);
                offset += 4;

                // drm_flags (4 bytes)
                Utils.uintToBytes(0, header, offset);
                offset += 4;

                // unknown_bytes_1 (12 bytes) - already zeroed
                offset += 12;

                // first_content_record_number (2 bytes)
                Utils.ushortToBytes(1, header, offset);
                offset += 2;

                // last_content_record_number (2 bytes)
                Utils.ushortToBytes(textRecordsCount, header, offset);
                offset += 2;

                // unknown_bytes_2 (4 bytes) - 0x00000001
                Utils.uintToBytes(0x00000001, header, offset, false);
                offset += 4;

                // fcis_record_number (4 bytes)
                Utils.uintToBytes(0xffffffff, header, offset, false);
                offset += 4;

                // fcis_record_count (4 bytes)
                Utils.uintToBytes(0, header, offset, false);
                offset += 4;

                // flis_record_number (4 bytes)
                Utils.uintToBytes(0xffffffff, header, offset, false);
                offset += 4;

                // flis_record_count (4 bytes)
                Utils.uintToBytes(0, header, offset, false);
                offset += 4;

                // unknown_bytes_3 (8 bytes) - already zeroed
                offset += 8;

                // unknown_bytes_4 (4 bytes) - 0xFFFFFFFF
                Utils.uintToBytes(0xffffffff, header, offset, false);
                offset += 4;

                // unknown_bytes_5 (4 bytes) - already zeroed
                offset += 4;

                // unknown_bytes_6 (4 bytes) - 0xFFFFFFFF
                Utils.uintToBytes(0xffffffff, header, offset, false);
                offset += 4;

                // unknown_bytes_7 (4 bytes) - 0xFFFFFFFF
                Utils.uintToBytes(0xffffffff, header, offset, false);
                offset += 4;

                // unknown_bytes_8 (2 bytes) - already zeroed
                offset += 2;

                // traildata_flags (2 bytes)
                Utils.ushortToBytes(1, header, offset);
                offset += 2;

                // first_indx_record_number (4 bytes)
                Utils.uintToBytes(0xffffffff, header, offset, false);
                offset += 4;

                this.data_ = header;
                return this.data_.length === this.size_;
            };

            MobiHeader.prototype.data = function () {
                return this.data_;
            };

            MobiHeader.prototype.size = function () {
                return this.size_;
            };

            // ============================================================
            // PalmDocHeader
            // ============================================================

            var PALM_DOC_HEADER_SIZE = 16;

            function PalmDocHeader() {
                this.size_ = PALM_DOC_HEADER_SIZE;
                this.data_ = null;
            }

            PalmDocHeader.prototype.generate = function (
                textSize,
                textRecordCount,
            ) {
                var header = Utils.createByteArray(PALM_DOC_HEADER_SIZE);
                var offset = 0;

                // compression (2 bytes) - 1 = no compression
                Utils.ushortToBytes(1, header, offset);
                offset += 2;

                // unused (2 bytes)
                offset += 2;

                // text_length (4 bytes)
                Utils.uintToBytes(textSize, header, offset);
                offset += 4;

                // text_record_count (2 bytes)
                Utils.ushortToBytes(textRecordCount, header, offset);
                offset += 2;

                // text_max_record_size (2 bytes)
                Utils.ushortToBytes(4096, header, offset);
                offset += 2;

                // current_position (4 bytes)
                Utils.uintToBytes(0, header, offset);
                offset += 4;

                this.data_ = header;
                return this.data_.length === this.size_;
            };

            PalmDocHeader.prototype.data = function () {
                return this.data_;
            };

            PalmDocHeader.prototype.size = function () {
                return this.size_;
            };

            // ============================================================
            // PalmDatabaseHeader
            // ============================================================

            var PALM_DB_HEADER_SIZE = 78; // sizeof PalmDatabaseHeaderStruct
            var RECORD_INFO_SIZE = 8; // sizeof RecordInfoStruct

            function PalmDatabaseHeader(recordsCount) {
                this.recordsCount_ = recordsCount;
                this.size_ =
                    PALM_DB_HEADER_SIZE + recordsCount * RECORD_INFO_SIZE + 2;
                this.data_ = null;
            }

            PalmDatabaseHeader.prototype.generate = function (
                mobiBookTitle,
                records,
            ) {
                var header = Utils.createByteArray(PALM_DB_HEADER_SIZE);
                var offset = 0;

                // name (32 bytes) - book title, null-padded
                var titleBytes = Utils.utf8Encode(mobiBookTitle);
                for (var i = 0; i < 32 && i < titleBytes.length; i++) {
                    header[offset + i] = titleBytes[i];
                }
                offset += 32;

                // attributes (2 bytes)
                offset += 2;

                // version (2 bytes)
                offset += 2;

                // creation_date (4 bytes) - seconds since Jan 1, 1904
                var timestamp = Math.floor(Date.now() / 1000) + 2082844800; // Unix to Palm epoch
                Utils.uintToBytes(timestamp, header, offset);
                offset += 4;

                // modification_date (4 bytes)
                Utils.uintToBytes(timestamp, header, offset);
                offset += 4;

                // last_backup_date (4 bytes)
                offset += 4;

                // modification_number (4 bytes)
                offset += 4;

                // app_info_id (4 bytes)
                offset += 4;

                // sort_info_id (4 bytes)
                offset += 4;

                                    description: descEl ? getText(descEl) : "",

                    html +=
                        '<p class="article-meta">' + escapeHtml(article.pubDate) + "</p>";
                }
                if (article.link) {
                    html +=
                        '<p><a href="' +
                        escapeHtml(article.link) +
                        '" target="_blank">Original Article</a></p>';
                }
                if (article.comments) {
                    html +=
                        '<p><a href="' +
                        escapeHtml(article.comments) +
                        '" target="_blank">Comments</a></p>';
                }
                html +=
                    '<hr style="margin: 15px 0; border: none; border-top: 1px solid #000;">';
                html += '<div class="article-body">' + content + "</div>";

                contentDiv.innerHTML = html;
                showArticleView();
            } catch (e) {
                alert("openArticle error: " + e.message);
            }
        }

        function fetchFullArticle() {
            try {
                if (!currentArticleUrl) {
                    alert("No article URL available");
                    return;
                }

                var loadingEl = document.getElementById("article-loading");
                var contentDiv = document.getElementById("article-content");
                var commentsContent = document.getElementById("comments-content");
                var commentsHtmlContent = document.getElementById("comments-html-content");

                // Hide comments views
                removeClass(commentsContent, "visible");
                removeClass(commentsHtmlContent, "visible");

                // Show article content
                addClass(contentDiv, "visible");
                removeClass(loadingEl, "hidden");

                fetchUrl(currentArticleUrl, function (error, htmlText) {
                    if (error) {
                        contentDiv.innerHTML +=
                            '<p class="error">Error fetching full article: ' +
                            escapeHtml(error.message) +
                            "</p>";
                        addClass(loadingEl, "hidden");
                        return;
                    }

                    try {
                        var doc;
                        if (window.DOMParser) {
                            doc = new DOMParser().parseFromString(htmlText, "text/html");
                        } else {
                            doc = document.createElement("div");
                            doc.innerHTML = htmlText;
                        }

                        // Use Mozilla Readability to extract the article content
                        var reader = new Readability(doc);
                        var extractedArticle = reader.parse();

                        var article = currentArticles[currentArticleIndex];

                        if (extractedArticle) {
                            var html =
                                "<h2>" +
                                escapeHtml(extractedArticle.title || article.title) +
                                "</h2>";
                            if (article.pubDate) {
                                html +=
                                    '<p class="article-meta">' +
                                    escapeHtml(article.pubDate) +
                                    "</p>";
                            }
                            html +=
                                '<p><a href="' +
                                escapeHtml(currentArticleUrl) +
                                '" target="_blank">Original Article</a></p>';
                            if (article.comments) {
                                html +=
                                    '<p><a href="' +
                                    escapeHtml(article.comments) +
                                    '" target="_blank">Comments</a></p>';
                            }
                            html +=
                                '<hr style="margin: 15px 0; border: none; border-top: 1px solid #000;">';
                            html +=
                                '<div class="article-body">' +
                                extractedArticle.content +
                                "</div>";
                            contentDiv.innerHTML = html;
                        } else {
                            contentDiv.innerHTML +=
                                '<p class="error">Readability could not parse this article.</p>';
                        }
                    } catch (e) {
                        contentDiv.innerHTML +=
                            '<p class="error">Error parsing article: ' +
                            escapeHtml(e.message) +
                            "</p>";
                    }

                    addClass(loadingEl, "hidden");
                });
            } catch (e) {
                alert("fetchFullArticle error: " + e.message);
            }
        }

        function fetchComments() {
            try {
                var article = currentArticles[currentArticleIndex];
                if (!article || !article.comments) {
                    return;
                }

                var commentsContent = document.getElementById("comments-content");
                var commentsLoading = document.getElementById("comments-loading");
                var articleContent = document.getElementById("article-content");
                var commentsHtmlContent = document.getElementById("comments-html-content");

                // Hide article and other comments view
                removeClass(articleContent, "visible");
                removeClass(commentsHtmlContent, "visible");

                // Show loading indicator
                removeClass(commentsLoading, "hidden");

                fetchUrl(article.comments, function (error, htmlText) {
                    if (error) {
                        commentsContent.innerHTML =
                            '<p class="error">Error fetching comments: ' +
                            escapeHtml(error.message) +
                            "</p>";
                        addClass(commentsContent, "visible");
                        addClass(commentsLoading, "hidden");
                        return;
                    }

                    try {
                        var doc;
                        if (window.DOMParser) {
                            doc = new DOMParser().parseFromString(htmlText, "text/html");
                        } else {
                            doc = document.createElement("div");
                            doc.innerHTML = htmlText;
                        }

                        // Use Mozilla Readability to extract the comments content
                        var reader = new Readability(doc);
                        var extractedContent = reader.parse();

                        if (extractedContent && extractedContent.content) {
                            commentsContent.innerHTML =
                                '<div class="comments-body">' +
                                extractedContent.content +
                                "</div>";
                            addClass(commentsContent, "visible");
                        } else {
                            commentsContent.innerHTML =
                                '<p class="error">Could not parse comments from this page.</p>';
                            addClass(commentsContent, "visible");
                        }
                    } catch (e) {
                        commentsContent.innerHTML =
                            '<p class="error">Error parsing comments: ' +
                            escapeHtml(e.message) +
                            "</p>";
                        addClass(commentsContent, "visible");
                    }

                    addClass(commentsLoading, "hidden");
                });
            } catch (e) {
                alert("fetchComments error: " + e.message);
            }
        }

        function fetchCommentsHtml() {
            try {
                var article = currentArticles[currentArticleIndex];
                if (!article || !article.comments) {
                    return;
                }

                var commentsHtmlContent = document.getElementById(
                    "comments-html-content",
                );
                var commentsLoading = document.getElementById("comments-loading");
                var articleContent = document.getElementById("article-content");
                var commentsContent = document.getElementById("comments-content");

                // Hide article and other comments view
                removeClass(articleContent, "visible");
                removeClass(commentsContent, "visible");

                removeClass(commentsLoading, "hidden");

                fetchUrl(article.comments, function (error, htmlText) {
                    if (error) {
                        commentsHtmlContent.innerHTML =
                            "Error fetching comments: " + escapeHtml(error.message);
                        addClass(commentsHtmlContent, "visible");
                        addClass(commentsLoading, "hidden");
                        return;
                    }

                    // Display raw HTML rendered
                    commentsHtmlContent.innerHTML = htmlText;
                    addClass(commentsHtmlContent, "visible");
                    addClass(commentsLoading, "hidden");
                });
            } catch (e) {
                alert("fetchCommentsHtml error: " + e.message);
            }
        }

        function downloadArticle() {
            try {
                var contentDiv = document.getElementById("article-content");
                var text = getText(contentDiv);
                var article = currentArticles[currentArticleIndex];
                var filename =
                    (article ? article.title : "article").replace(/[^a-z0-9]/gi, "_") +
                    ".txt";

                // Try data URI download
                var a = document.createElement("a");
                a.href = "data:text/plain;charset=utf-8," + encodeURIComponent(text);
                a.setAttribute("download", filename);
                a.style.display = "none";
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            } catch (e) {
                alert("downloadArticle error: " + e.message);
            }
        }

        function escapeHtml(text) {
            if (!text) return "";
            var div = document.createElement("div");
            setText(div, text);
            return div.innerHTML;
        }
        function generateEpubFromArticle(title, htmlContent, callback) {
            try {
                var zip = new JSZip();

                // Required mimetype file
                zip.file("mimetype", "application/epub+zip");

                // META-INF/container.xml
                zip.file(
                    "META-INF/container.xml",
                    '<?xml version="1.0"?>\n' +
                    '<container version="1.0" xmlns="urn:oasis:names:tc:opendocument:xmlns:container">\n' +
                    "  <rootfiles>\n" +
                    '    <rootfile full-path="OEBPS/content.opf" media-type="application/oebps-package+xml"/>\n' +
                    "  </rootfiles>\n" +
                    "</container>",
                );

                // HTML content
                zip.file("OEBPS/content.xhtml", htmlContent);

                // Basic OPF file
                zip.file(
                    "OEBPS/content.opf",
                    '<?xml version="1.0" encoding="UTF-8"?>\n' +
                    '<package xmlns="http://www.idpf.org/2007/opf" unique-identifier="BookId" version="3.0">\n' +
                    '  <metadata xmlns:dc="http://purl.org/dc/elements/1.1/">\n' +
                    "    <dc:title>" +
                    escapeHtml(title) +
                    "</dc:title>\n" +
                    "    <dc:language>en</dc:language>\n" +
                    '    <dc:identifier id="BookId">id123456</dc:identifier>\n' +
                    "  </metadata>\n" +
                    "  <manifest>\n" +
                    '    <item id="content" href="content.xhtml" media-type="application/xhtml+xml"/>\n' +
                    "  </manifest>\n" +
                    "  <spine>\n" +
                    '    <itemref idref="content"/>\n' +
                    "  </spine>\n" +
                    "</package>",
                );

                // Generate EPUB Blob
                zip.generateAsync({type: "blob"}).then(
                    function (epubBlob) {
                        callback(null, epubBlob);
                    },
                    function (err) {
                        callback(err, null);
                    },
                );
            } catch (e) {
                callback(e, null);
            }
        }

        // Attach click event to MOBI download button
        var btn = document.getElementById("download-mobi-btn");
        if (btn) {
            var generateAndDownloadMobi = function (
                article,
                articleHtml,
                commentsHtml,
            ) {
                var htmlContent =
                    "<html><body><h1>" +
                    escapeHtml(article.title) +
                    "</h1>" +
                    articleHtml;

                if (commentsHtml) {
                    htmlContent += "<hr/><h2>Comments</h2>" + commentsHtml;
                }

                htmlContent += "</body></html>";

                var title = article.title || "Article";
                var filename = title.replace(/[^a-z0-9]/gi, "_") + ".mobi";

                var book = new MobiBook(title, "RSS Reader");
                book.setHtmlContent(htmlContent);

                var writer = new MobiWriter();
                var result = writer.write(book, filename);

                if (!result.success) {
                    alert("Error generating MOBI: " + result.error);
                }
            };

            var downloadMobiHandler = function () {
                if (
                    typeof currentArticleIndex === "undefined" ||
                    currentArticleIndex < 0
                ) {
                    alert("No article selected");
                    return;
                }

                var article = currentArticles[currentArticleIndex];
                var contentDiv = document.getElementById("article-content");
                var articleHtml = contentDiv.innerHTML;

                // If there's a comments URL, fetch and include comments
                if (article.comments) {
                    fetchUrl(article.comments, function (error, htmlText) {
                        var commentsHtml = "";
                        if (!error && htmlText) {
                            try {
                                var doc;
                                if (window.DOMParser) {
                                    doc = new DOMParser().parseFromString(
                                        htmlText,
                                        "text/html",
                                    );
                                } else {
                                    doc = document.createElement("div");
                                    doc.innerHTML = htmlText;
                                }
                                var reader = new Readability(doc);
                                var parsed = reader.parse();
                                if (parsed && parsed.content) {
                                    commentsHtml = parsed.content;
                                }
                            } catch (e) {
                                // Ignore parsing errors, just skip comments
                            }
                        }
                        generateAndDownloadMobi(article, articleHtml, commentsHtml);
                    });
                } else {
                    generateAndDownloadMobi(article, articleHtml, "");
                }
            };

            if (btn.addEventListener) {
                btn.addEventListener("click", downloadMobiHandler, false);
            } else if (btn.attachEvent) {
                btn.attachEvent("onclick", downloadMobiHandler);
            }
        }

        // Attach click event to View Comments button
        var viewCommentsBtn = document.getElementById("view-comments-btn");
        if (viewCommentsBtn) {
            if (viewCommentsBtn.addEventListener) {
                viewCommentsBtn.addEventListener("click", fetchComments, false);
            } else if (viewCommentsBtn.attachEvent) {
                viewCommentsBtn.attachEvent("onclick", fetchComments);
            }
        }

        // Attach click event to View Comments HTML button
        var viewCommentsHtmlBtn = document.getElementById(
            "view-comments-html-btn",
        );
        if (viewCommentsHtmlBtn) {
            if (viewCommentsHtmlBtn.addEventListener) {
                viewCommentsHtmlBtn.addEventListener(
                    "click",
                    fetchCommentsHtml,
                    false,
                );
            } else if (viewCommentsHtmlBtn.attachEvent) {
                viewCommentsHtmlBtn.attachEvent("onclick", fetchCommentsHtml);
            }
        }

        // Helper: get hash parameter (fallback for older browsers)
        function getHashParam(name) {
            var hash = window.location.hash;
            if (!hash || hash.length < 2) return null;
            hash = hash.substring(1); // Remove #
            var pairs = hash.split("&");
            for (var i = 0; i < pairs.length; i++) {
                var pair = pairs[i].split("=");
                if (decodeURIComponent(pair[0]) === name) {
                    return pair[1] ? decodeURIComponent(pair[1]) : "";
                }
            }
            return null;
        }

        // Initialize
        function init() {
            try {
                // Render saved feeds from localStorage
                renderSavedFeeds();

                var feedInput = document.getElementById("feed-url");
                if (feedInput.addEventListener) {
                    feedInput.addEventListener("keypress", function (e) {
                        var key = e.key || e.keyCode;
                        if (key === "Enter" || key === 13) {
                            loadFeed();
                        }
                    });
                } else if (feedInput.attachEvent) {
                    feedInput.attachEvent("onkeypress", function (e) {
                        if (e.keyCode === 13) {
                            loadFeed();
                        }
                    });
                }

                // Populate input from URL parameter if present (check query string first, then hash)
                var feedParam = getUrlParam("feed") || getHashParam("feed");
                if (feedParam) {
                    feedInput.value = feedParam;
                    loadFeed(); // Auto-load the feed
                }
            } catch (e) {
                alert("init error: " + e.message);
            }
        }

        // Run init when DOM is ready
        try {
            if (
                document.readyState === "complete" ||
                document.readyState === "interactive"
            ) {
                init();
            } else if (document.addEventListener) {
                document.addEventListener("DOMContentLoaded", init);
            } else if (document.attachEvent) {
                document.attachEvent("onreadystatechange", function () {
                    if (document.readyState === "complete") {
                        init();
                    }
                });
            }
        } catch (e) {
            alert("Startup error: " + e.message);
        }
    </script>
