<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RSS Reader for Kindle</title>
        <link rel="stylesheet"  href="./css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@mozilla/readability@0.5.0/Readability.min.js"></script>
    <script type="text/javascript" src="https://stuk.github.io/jszip/dist/jszip.js"></script>

    <script type="text/javascript" src="//stuk.github.io/jszip-utils/dist/jszip-utils.js"></script>
</head>

<body>
    <div id="scroll-buttons" class="scroll-buttons hidden">
        <button id="scroll-up-btn" class="scroll-btn" onclick="scrollPage(-1)">^</button>
        <button id="scroll-down-btn" class="scroll-btn" onclick="scrollPage(1)">v</button>
    </div>
    <div class="container">
        <div class="controls">
            <div class="control-row">
                <div class="control-group">
                    <span class="control-label">Font:</span>
                    <button onclick="adjustFontSize(-2)" aria-label="Decrease font size">
                        A-
                    </button>
                    <button onclick="adjustFontSize(2)" aria-label="Increase font size">
                        A+
                    </button>
                </div>
                <div class="control-group">
                    <span class="control-label">Spacing:</span>
                    <button onclick="adjustSpacing(-1)" aria-label="Decrease spacing">
                        -
                    </button>
                    <button onclick="adjustSpacing(1)" aria-label="Increase spacing">
                        +
                    </button>
                </div>
                <div class="control-group">
                    <span class="control-label">Line:</span>
                    <button onclick="adjustLineHeight(-0.1)" aria-label="Decrease line height">
                        -
                    </button>
                    <button onclick="adjustLineHeight(0.1)" aria-label="Increase line height">
                        +
                    </button>
                </div>
            </div>
        </div>

        <div id="input-view" class="active">
            <div class="feed-input-section">
                <label for="feed-url"><strong>Enter RSS Feed URL:</strong></label>
                <input type="text" id="feed-url" placeholder="https://example.com/feed.xml" />
                <button onclick="loadFeed()">Load Feed</button>
                <button class="secondary" onclick="saveCurrentFeed()">
                    Save Feed
                </button>
                <button class="secondary" onclick="toggleSavedFeeds()">
                    Saved Feeds
                </button>
                <div id="render-progress" style="display: inline" class="loading">
                    0/0
                </div>
            </div>
            <div id="input-error" class="error hidden"></div>
            <div id="saved-feeds-section" class="saved-feeds-section hidden">
                <ul id="saved-feeds-list" class="saved-feeds-list"></ul>
            </div>
        </div>

        <div id="feed-view">
            <h2 id="feed-title">Feed Articles</h2>
            <div class="nav-buttons" id="normal-nav-buttons" style="display: flex;">
                <button onclick="startArticleSelection('text')">Download All (text)</button>
                <button onclick="startArticleSelection('mobi')">Download All (MOBI)</button>
            </div>
            <div class="nav-buttons" id="selection-nav-buttons" style="display: none;">
                <button onclick="downloadSelectedArticles()" class="primary">Download Selected</button>
                <button onclick="cancelArticleSelection()" class="secondary">Cancel</button>
                <span style="margin-left: 15px; font-weight: bold;">Selected: <span id="selection-count">0</span> articles</span>
            </div>
            <hr />
            <div id="feed-loading" class="loading hidden">Loading feed...</div>
            <div id="download-all-progress" class="loading hidden">Downloading articles...</div>
            <ul id="article-list" class="article-list"></ul>
        </div>

        <div id="article-view">
            <div class="nav-buttons">
                <button class="secondary" onclick="showFeedView()">
                    Back to List
                </button>
                <button onclick="fetchFullArticle()">Get Full Article</button>
                <button onclick="downloadArticle()">Download (text)</button>
                <button id="download-mobi-btn">Download (MOBI)</button>
                <button id="download-epub-btn">Download (EPUB)</button>
                <button id="view-comments-btn" style="display: none">
                    View Comments
                </button>
                <button id="view-comments-html-btn" style="display: none">
                    View Comments HTML
                </button>
            </div>
            <div id="article-loading" class="loading hidden">
                Loading article...
            </div>
            <div id="article-content" class="article-content visible"></div>
            <div id="comments-loading" class="loading hidden">
                Loading comments...
            </div>
            <div id="comments-content" class="article-content"></div>
            <div id="comments-html-content" class="article-content"></div>
        </div>
    </div>

        <script src="./js/lib/mobiWriter.js"></script>
        <script src="./js/lib/googleNewsDecoder.js"></script>
    <script>
        // Global error handler
        window.onerror = function (message, source, lineno, colno, error) {
            alert("Error: " + message + "\nLine: " + lineno);
            return false;
        };

        // State
        var currentFontSize = 16;
        var currentLetterSpacing = 0;
        var currentLineHeight = 1.5;
        var currentArticles = [];
        var currentArticleIndex = -1;
        var currentArticleUrl = "";
        var SAVED_FEEDS_KEY = "savedFeeds";

        // Saved feeds management
        function getSavedFeeds() {
            try {
                if (!window.localStorage) return [];
                var data = localStorage.getItem(SAVED_FEEDS_KEY);
                if (!data) return [];
                return JSON.parse(data);
            } catch (e) {
                return [];
            }
        }

        function saveCurrentFeed() {
            try {
                if (!window.localStorage) {
                    alert("localStorage not available");
                    return;
                }
                var feedInput = document.getElementById("feed-url");
                var url = feedInput.value.replace(/^\s+|\s+$/g, "");
                if (!url) {
                    alert("Please enter a feed URL first");
                    return;
                }

                var feeds = getSavedFeeds();
                // Check if already exists
                for (var i = 0; i < feeds.length; i++) {
                    if (feeds[i].url === url) {
                        return;
                    }
                }
                // Add new feed
                feeds.push({url: url, title: url});
                localStorage.setItem(SAVED_FEEDS_KEY, JSON.stringify(feeds));
                renderSavedFeeds();
            } catch (e) {
                alert("Error saving feed: " + e.message);
            }
        }

        function deleteFeed(url) {
            try {
                if (!window.localStorage) return;
                var feeds = getSavedFeeds();
                var newFeeds = [];
                for (var i = 0; i < feeds.length; i++) {
                    if (feeds[i].url !== url) {
                        newFeeds.push(feeds[i]);
                    }
                }
                localStorage.setItem(SAVED_FEEDS_KEY, JSON.stringify(newFeeds));
                renderSavedFeeds();
            } catch (e) {
                // Silently fail
            }
        }

        function moveFeed(index, direction) {
            try {
                if (!window.localStorage) return;
                var feeds = getSavedFeeds();
                var newIndex = index + direction;
                if (newIndex < 0 || newIndex >= feeds.length) return;
                // Swap feeds
                var temp = feeds[index];
                feeds[index] = feeds[newIndex];
                feeds[newIndex] = temp;
                localStorage.setItem(SAVED_FEEDS_KEY, JSON.stringify(feeds));
                renderSavedFeeds();
            } catch (e) {
                // Silently fail
            }
        }

        function loadSavedFeed(url) {
            var feedInput = document.getElementById("feed-url");
            feedInput.value = url;
            // Hide saved feeds list
            addClass(document.getElementById("saved-feeds-section"), "hidden");
            loadFeed();
        }

        function toggleSavedFeeds() {
            var section = document.getElementById("saved-feeds-section");
            if (section.className.indexOf("hidden") >= 0) {
                removeClass(section, "hidden");
            } else {
                addClass(section, "hidden");
            }
        }

        function renderSavedFeeds() {
            var list = document.getElementById("saved-feeds-list");
            var feeds = getSavedFeeds();

            list.innerHTML = "";

            if (feeds.length === 0) {
                var emptyMsg = document.createElement("li");
                emptyMsg.className = "saved-feed-item";
                setText(emptyMsg, "No saved feeds");
                list.appendChild(emptyMsg);
                return;
            }

            for (var i = 0; i < feeds.length; i++) {
                var feed = feeds[i];

                var li = document.createElement("li");
                li.className = "saved-feed-item";

                var link = document.createElement("a");
                link.className = "saved-feed-link";
                setText(link, feed.title || feed.url);
                link.title = feed.url;
                // Use closure to capture url
                (function (url) {
                    link.onclick = function () {
                        loadSavedFeed(url);
                        return false;
                    };
                })(feed.url);

                // Up arrow button
                var upBtn = document.createElement("button");
                upBtn.className = "secondary delete-feed-btn";
                setText(upBtn, "^");
                upBtn.title = "Move up";
                (function (index) {
                    upBtn.onclick = function () {
                        moveFeed(index, -1);
                        return false;
                    };
                })(i);

                // Down arrow button
                var downBtn = document.createElement("button");
                downBtn.className = "secondary delete-feed-btn";
                setText(downBtn, "v");
                downBtn.title = "Move down";
                (function (index) {
                    downBtn.onclick = function () {
                        moveFeed(index, 1);
                        return false;
                    };
                })(i);

                var deleteBtn = document.createElement("button");
                deleteBtn.className = "secondary delete-feed-btn";
                setText(deleteBtn, "X");
                deleteBtn.title = "Delete";
                // Use closure to capture url
                (function (url) {
                    deleteBtn.onclick = function () {
                        deleteFeed(url);
                        return false;
                    };
                })(feed.url);

                li.appendChild(link);
                li.appendChild(upBtn);
                li.appendChild(downBtn);
                li.appendChild(deleteBtn);
                list.appendChild(li);
            }
        }

        // Helper: add class to element
        function addClass(el, className) {
            if (!el) return;
            var classes = el.className.split(" ");
            var found = false;
            for (var i = 0; i < classes.length; i++) {
                if (classes[i] === className) {
                    found = true;
                    break;
                }
            }
            if (!found) {
                classes.push(className);
            }
            el.className = classes.join(" ").replace(/^\s+|\s+$/g, "");
        }

        // Helper: remove class from element
        function removeClass(el, className) {
            if (!el) return;
            var classes = el.className.split(" ");
            var newClasses = [];
            for (var i = 0; i < classes.length; i++) {
                if (classes[i] !== className && classes[i] !== "") {
                    newClasses.push(classes[i]);
                }
            }
            el.className = newClasses.join(" ");
        }

        // Helper: get text content safely
        function getText(el) {
            if (!el) return "";
            return el.textContent || el.innerText || "";
        }

        // Helper: set text content safely
        function setText(el, text) {
            if (!el) return;
            if (typeof el.textContent !== "undefined") {
                el.textContent = text;
            } else {
                el.innerText = text;
            }
        }

        // Helper: get element by tag name from parent
        function getFirstByTag(parent, tagName) {
            if (!parent) return null;
            var elements = parent.getElementsByTagName(tagName);
            return elements.length > 0 ? elements[0] : null;
        }

        // Helper: parse URL parameters
        function getUrlParam(name) {
            var search = window.location.search;
            if (!search) return null;
            search = search.substring(1);
            var pairs = search.split("&");
            for (var i = 0; i < pairs.length; i++) {
                var pair = pairs[i].split("=");
                if (decodeURIComponent(pair[0]) === name) {
                    return pair[1] ? decodeURIComponent(pair[1]) : "";
                }
            }
            return null;
        }

        // XMLHttpRequest fetch with callback
        function fetchUrl(url, callback) {
            try {
                var useProxy = true;
                if (useProxy) {
                    // url = "https://cors-anywhere.com/" + url;
                    url = "https://corsproxy.io/?url=" + url
                }
                var xhr;
                if (window.XMLHttpRequest) {
                    xhr = new XMLHttpRequest();
                } else {
                    xhr = new ActiveXObject("Microsoft.XMLHTTP");
                }
                xhr.onreadystatechange = function () {
                    try {
                        if (xhr.readyState === 4) {
                            if (xhr.status === 200) {
                                callback(null, xhr.responseText);
                            } else {
                                callback(new Error("Fetch failed: " + xhr.status), null);
                            }
                        }
                    } catch (e) {
                        alert("XHR callback error: " + e.message);
                    }
                };
                xhr.open("GET", url, true);
                xhr.send(null);
            } catch (e) {
                alert("fetchUrl error: " + e.message);
                callback(e, null);
            }
        }

        // Font and spacing controls
        function adjustFontSize(delta) {
            currentFontSize = Math.max(12, Math.min(32, currentFontSize + delta));
            document.body.style.fontSize = currentFontSize + "px";
        }

        function adjustSpacing(delta) {
            currentLetterSpacing = Math.max(
                -1,
                Math.min(5, currentLetterSpacing + delta),
            );
            document.body.style.letterSpacing = currentLetterSpacing + "px";
            document.body.style.wordSpacing = currentLetterSpacing * 2 + "px";
        }

        function adjustLineHeight(delta) {
            currentLineHeight = Math.max(1, Math.min(3, currentLineHeight + delta));
            document.body.style.lineHeight = currentLineHeight;
        }

        // View management
        function showInputView() {
            addClass(document.getElementById("input-view"), "active");
            removeClass(document.getElementById("feed-view"), "active");
            removeClass(document.getElementById("article-view"), "active");
        }

        function showFeedView() {
            removeClass(document.getElementById("input-view"), "active");
            addClass(document.getElementById("feed-view"), "active");
            removeClass(document.getElementById("article-view"), "active");
            if (currentArticleIndex >= 0) {
                var articleEl = document.getElementById(
                    "article-" + currentArticleIndex,
                );
                if (articleEl) {
                    articleEl.scrollIntoView();
                }
            }
        }

        function showArticleView() {
            removeClass(document.getElementById("input-view"), "active");
            removeClass(document.getElementById("feed-view"), "active");
            addClass(document.getElementById("article-view"), "active");
        }

        function showError(elementId, message) {
            var el = document.getElementById(elementId);
            setText(el, message);
            removeClass(el, "hidden");
        }

        function hideError(elementId) {
            addClass(document.getElementById(elementId), "hidden");
        }

        // RSS Feed loading
        function loadFeed() {
            try {
                var urlInput = document.getElementById("feed-url");
                var url = urlInput.value;
                // Trim manually for ES3
                url = url.replace(/^\s+|\s+$/g, "");

                if (!url) {
                    showError("input-error", "Please enter a feed URL");
                    return;
                }

                // Save feed URL to browser URL for persistence on refresh
                if (window.history && window.history.replaceState) {
                    window.history.replaceState(
                        null,
                        "",
                        "?feed=" + encodeURIComponent(url),
                    );
                } else {
                    // Fallback for older browsers - use location.hash to avoid page reload
                    window.location.hash = "feed=" + encodeURIComponent(url);
                }

                hideError("input-error");
                removeClass(document.getElementById("feed-loading"), "hidden");
                document.getElementById("article-list").innerHTML = "";
                showFeedView();

                fetchUrl(url, function (error, xmlText) {
                    if (error) {
                        showInputView();
                        showError("input-error", "Error loading feed: " + error.message);
                        addClass(document.getElementById("feed-loading"), "hidden");
                        return;
                    }

                    try {
                        var xml;
                        if (window.DOMParser) {
                            var parser = new DOMParser();
                            xml = parser.parseFromString(xmlText, "text/xml");
                        } else {
                            xml = new ActiveXObject("Microsoft.XMLDOM");
                            xml.async = false;
                            xml.loadXML(xmlText);
                        }

                        var articles = [];
                        var feedTitle = "Feed";
                        var progress = document.getElementById("render-progress");
                        var i, item, entry, titleEl, linkEl, descEl, contentEl, pubDateEl;

                        // Try RSS 2.0
                        var channels = xml.getElementsByTagName("channel");
                        if (channels.length > 0) {
                            var channel = channels[0];
                            var channelTitle = getFirstByTag(channel, "title");
                            feedTitle = channelTitle ? getText(channelTitle) : "RSS Feed";

                            var items = xml.getElementsByTagName("item");
                            var total = items.length;
                            setText(progress, "0/" + total);

                            for (i = 0; i < items.length; i++) {
                                item = items[i];
                                titleEl = getFirstByTag(item, "title");
                                linkEl = getFirstByTag(item, "link");
                                descEl = getFirstByTag(item, "description");
                                contentEl = getFirstByTag(item, "encoded");
                                pubDateEl = getFirstByTag(item, "pubDate");
                                var commentsEl = getFirstByTag(item, "comments");

                                articles.push({
                                    index: i,
                                    title: titleEl ? getText(titleEl) : "Untitled",
                                    link: linkEl ? getText(linkEl) : "",
                                    comments: commentsEl ? getText(commentsEl) : "",
                                    description: descEl ? getText(descEl) : "",
                                    content: contentEl ? getText(contentEl) : "",
                                    pubDate: pubDateEl ? getText(pubDateEl) : "",
                                });
                                setText(progress, i + 1 + "/" + total);
                            }
                        }

                        // Try Atom
                        if (articles.length === 0) {
                            var feeds = xml.getElementsByTagName("feed");
                            if (feeds.length > 0) {
                                var feedTitleEl = getFirstByTag(feeds[0], "title");
                                feedTitle = feedTitleEl ? getText(feedTitleEl) : "Atom Feed";
                            }

                            var entries = xml.getElementsByTagName("entry");
                            var totalEntries = entries.length;
                            setText(progress, "0/" + totalEntries);

                            for (i = 0; i < entries.length; i++) {
                                entry = entries[i];
                                titleEl = getFirstByTag(entry, "title");

                                // Get link href attribute
                                var linkHref = "";
                                var links = entry.getElementsByTagName("link");
                                for (var j = 0; j < links.length; j++) {
                                    var rel = links[j].getAttribute("rel");
                                    if (!rel || rel === "alternate") {
                                        linkHref = links[j].getAttribute("href") || "";
                                        break;
                                    }
                                }

                                descEl = getFirstByTag(entry, "summary");
                                contentEl = getFirstByTag(entry, "content");
                                pubDateEl = getFirstByTag(entry, "published");
                                if (!pubDateEl) pubDateEl = getFirstByTag(entry, "updated");

                                // For Reddit feeds, the link is the comments page
                                var commentsUrl = "";
                                if (linkHref && linkHref.indexOf("reddit.com") >= 0) {
                                    commentsUrl = linkHref + "/.json";
                                }

                                articles.push({
                                    index: i,
                                    title: titleEl ? getText(titleEl) : "Untitled",
                                    link: linkHref,
                                    comments: commentsUrl,
                                    description: descEl ? getText(descEl) : "",
                                    content: contentEl ? getText(contentEl) : "",
                                    pubDate: pubDateEl ? getText(pubDateEl) : "",
                                });
                                setText(progress, i + 1 + "/" + totalEntries);
                            }
                        }

                        if (articles.length === 0) {
                            throw new Error("No articles found in feed");
                        }

                        currentArticles = articles;
                        setText(document.getElementById("feed-title"), feedTitle);
                        document.title = feedTitle;
                        renderArticleList(articles);
                    } catch (e) {
                        showInputView();
                        showError("input-error", "Error loading feed: " + e.message);
                    }

                    addClass(document.getElementById("feed-loading"), "hidden");
                });
            } catch (e) {
                alert("loadFeed error: " + e.message);
            }
        }

        function renderArticleList(articles) {
            try {
                var list = document.getElementById("article-list");
                var progress = document.getElementById("render-progress");
                var total = articles.length;

                list.innerHTML = "";
                setText(progress, "0/" + total);

                var fragment = document.createDocumentFragment();

                for (var i = 0; i < articles.length; i++) {
                    var article = articles[i];

                    var li = document.createElement("li");
                    li.className = "article-item";
                    li.id = "article-" + i;

                    var title = document.createElement("a");
                    title.className = "article-title";
                    setText(title, article.title);
                    // Use closure to capture index
                    (function (index) {
                        title.onclick = function () {
                            openArticle(index);
                            return false;
                        };
                    })(i);

                    var meta = document.createElement("div");
                    meta.className = "article-meta";
                    if (article.pubDate) {
                        var date = new Date(article.pubDate);
                        var dateText = isNaN(date.getTime())
                            ? article.pubDate
                            : date.toLocaleDateString();
                        setText(meta, dateText);
                    }

                    var desc = document.createElement("div");
                    desc.className = "article-description";
                    // Strip HTML and truncate
                    var tempDiv = document.createElement("div");
                    tempDiv.innerHTML = article.description;
                    var plainText = getText(tempDiv);
                    var truncated = plainText.substring(0, 200);
                    if (plainText.length > 200) truncated += "...";
                    setText(desc, truncated);

                    li.appendChild(title);
                    if (getText(meta)) li.appendChild(meta);
                    if (getText(desc)) li.appendChild(desc);
                    fragment.appendChild(li);

                    setText(progress, i + 1 + "/" + total);
                }

                list.appendChild(fragment);
            } catch (e) {
                alert("renderArticleList error: " + e.message);
            }
        }

        function openArticle(index) {
            try {
                currentArticleIndex = index;
                window.location.hash = "article-" + index;
                var article = currentArticles[index];

                // Function to render the article once we have the final URL
                function renderArticle(finalUrl) {
                    currentArticleUrl = finalUrl;
                    article.link = finalUrl;

                    // Reset comments state
                    var commentsContent = document.getElementById("comments-content");
                    var commentsLoading = document.getElementById("comments-loading");
                    var commentsHtmlContent = document.getElementById(
                        "comments-html-content",
                    );
                    var viewCommentsBtn = document.getElementById("view-comments-btn");
                    var viewCommentsHtmlBtn = document.getElementById(
                        "view-comments-html-btn",
                    );
                    commentsContent.innerHTML = "";
                    commentsHtmlContent.innerHTML = "";
                    removeClass(commentsContent, "visible");
                    removeClass(commentsHtmlContent, "visible");
                    addClass(commentsLoading, "hidden");

                    // Show/hide View Comments buttons based on whether article has comments
                    if (article.comments) {
                        viewCommentsBtn.style.display = "";
                        viewCommentsHtmlBtn.style.display = "";
                    } else {
                        viewCommentsBtn.style.display = "none";
                        viewCommentsHtmlBtn.style.display = "none";
                    }

                    var contentDiv = document.getElementById("article-content");

                    // Ensure article content is visible
                    addClass(contentDiv, "visible");

                    // Use content:encoded if available, otherwise description
                    var content = article.content || article.description || "";

                    var html = "<h2>" + escapeHtml(article.title) + "</h2>";
                    if (article.pubDate) {
                        html +=
                            '<p class="article-meta">' + escapeHtml(article.pubDate) + "</p>";
                    }
                    if (finalUrl) {
                        html +=
                            '<p><a href="' +
                            escapeHtml(finalUrl) +
                            '" target="_blank">Original Article</a></p>';
                    }
                    if (article.comments) {
                        html +=
                            '<p><a href="' +
                            escapeHtml(article.comments) +
                            '" target="_blank">Comments</a></p>';
                    }
                    html +=
                        '<hr style="margin: 15px 0; border: none; border-top: 1px solid #000;">';
                    html += '<div class="article-body">' + content + "</div>";

                    contentDiv.innerHTML = html;
                    showArticleView();
                }

                // Check if this is a Google News URL and decode it
                if (article.link && article.link.indexOf('news.google.com') >= 0) {
                    // Show a loading indicator
                    var contentDiv = document.getElementById("article-content");
                    contentDiv.innerHTML = '<p>Decoding Google News URL...</p>';
                    addClass(contentDiv, "visible");
                    showArticleView();

                    decodeGoogleNewsUrl(article.link, function(error, result) {
                        if (error) {
                            // If decoding fails, use the original URL
                            console.log('Google News URL decode error:', error);
                            renderArticle(article.link);
                        } else {
                            // Use the decoded URL
                            renderArticle(result.decoded_url);
                        }
                    });
                } else {
                    // Not a Google News URL, render normally
                    renderArticle(article.link);
                }
            } catch (e) {
                alert("openArticle error: " + e.message);
            }
        }

        function fetchFullArticle() {
            try {
                if (!currentArticleUrl) {
                    alert("No article URL available");
                    return;
                }

                var loadingEl = document.getElementById("article-loading");
                var contentDiv = document.getElementById("article-content");
                var commentsContent = document.getElementById("comments-content");
                var commentsHtmlContent = document.getElementById("comments-html-content");

                // Hide comments views
                removeClass(commentsContent, "visible");
                removeClass(commentsHtmlContent, "visible");

                // Show article content
                addClass(contentDiv, "visible");
                removeClass(loadingEl, "hidden");

                fetchUrl(currentArticleUrl, function (error, htmlText) {
                    if (error) {
                        contentDiv.innerHTML +=

        function fetchComments() {
            try {
                var article = currentArticles[currentArticleIndex];
                if (!article || !article.comments) {
                    return;
                }

                var commentsContent = document.getElementById("comments-content");
                var commentsLoading = document.getElementById("comments-loading");
                var articleContent = document.getElementById("article-content");
                var commentsHtmlContent = document.getElementById("comments-html-content");

                // Hide article and other comments view
                removeClass(articleContent, "visible");
                removeClass(commentsHtmlContent, "visible");

                // Show loading indicator
                removeClass(commentsLoading, "hidden");

                fetchUrl(article.comments, function (error, responseText) {
                    if (error) {
                        commentsContent.innerHTML =
                            '<p class="error">Error fetching comments: ' +
                            escapeHtml(error.message) +
                            "</p>";
                        addClass(commentsContent, "visible");
                        addClass(commentsLoading, "hidden");
                        return;
                    }

                    try {
                        // Check if this is a JSON feed (Reddit)
                        var isJsonFeed = article.comments.indexOf(".json") >= 0;

                        if (isJsonFeed) {
                            // Parse Reddit JSON
                            var json = JSON.parse(responseText);
                            var htmlParts = [];

                            // Recursive function to render comment and its replies
                            var replyCount = {count: 0};
                            function renderComment(commentData, depth, isTopLevel) {
                                if (!commentData || !commentData.data) return;
                                var data = commentData.data;

                                // Skip "more" comments
                                if (commentData.kind === "more") return;

                                // Limit replies to 50 per top-level comment
                                if (!isTopLevel) {
                                    if (replyCount.count >= 50) return;
                                    replyCount.count++;
                                }

                                var indent = depth * 20;
                                htmlParts.push('<div style="margin-left: ' + indent + 'px; margin-bottom: 15px; padding: 10px; border-left: 2px solid #ccc;">');

                                if (data.author) {
                                    htmlParts.push('<p style="font-weight: bold; margin-bottom: 5px;">');
                                    htmlParts.push(escapeHtml(data.author));
                                    htmlParts.push('</p>');
                                }

                                if (data.created_utc) {
                                    var date = new Date(data.created_utc * 1000);
                                    htmlParts.push('<p style="font-size: 0.85em; color: #666; margin-bottom: 10px;">');
                                    htmlParts.push(escapeHtml(date.toLocaleString()));
                                    htmlParts.push('</p>');
                                }

                                if (data.body_html) {
                                    htmlParts.push('<div style="margin-bottom: 10px;">');
                                    // Decode HTML entities in body_html
                                    var tempDiv = document.createElement("div");
                                    tempDiv.innerHTML = data.body_html;
                                    // Get just the text content (strips HTML tags)
                                    var textContent = getText(tempDiv);
                                    // Replace newlines with <br> for display
                                    textContent = textContent.replace(/\n/g, "<br>");
                                    htmlParts.push(textContent);
                                    htmlParts.push('</div>');
                                }

                                htmlParts.push('</div>');

                                // Render replies recursively
                                if (data.replies && data.replies.data && data.replies.data.children) {
                                    var replies = data.replies.data.children;
                                    for (var i = 0; i < replies.length; i++) {
                                        renderComment(replies[i], depth + 1, false);
                                    }
                                }
                            }

                            // json[0] is post, json[1] is comments
                            if (json.length > 1 && json[1].data && json[1].data.children) {
                                var comments = json[1].data.children;
                                var maxComments = Math.min(comments.length, 100);
                                for (var i = 0; i < maxComments; i++) {
                                    replyCount.count = 0; // Reset reply counter for each top-level comment
                                    renderComment(comments[i], 0, true);
                                }
                            }

                            if (htmlParts.length === 0) {
                                commentsContent.innerHTML =
                                    '<p class="error">No comments found.</p>';
                            } else {
                                commentsContent.innerHTML =
                                    '<div class="comments-body">' + htmlParts.join("") + "</div>";
                            }
                            addClass(commentsContent, "visible");
                        } else {
                            // Parse as HTML using Readability
                            var doc;
                            if (window.DOMParser) {
                                doc = new DOMParser().parseFromString(responseText, "text/html");
                            } else {
                                doc = document.createElement("div");
                                doc.innerHTML = responseText;
                            }

                            var reader = new Readability(doc);
                            var extractedContent = reader.parse();

                            if (extractedContent && extractedContent.content) {
                                commentsContent.innerHTML =
                                    '<div class="comments-body">' +
                                    extractedContent.content +
                                    "</div>";
                                addClass(commentsContent, "visible");
                            } else {
                                commentsContent.innerHTML =
                                    '<p class="error">Could not parse comments from this page.</p>';
                                addClass(commentsContent, "visible");
                            }
                        }
                    } catch (e) {
                        commentsContent.innerHTML =
                            '<p class="error">Error parsing comments: ' +
                            escapeHtml(e.message) +
                            "</p>";
                        addClass(commentsContent, "visible");
                    }

                    addClass(commentsLoading, "hidden");
                });
            } catch (e) {
                alert("fetchComments error: " + e.message);
            }
        }

        // Fetch full article with retry logic
        function fetchFullArticleWithRetry(url, maxRetries, callback) {
            var attempts = 0;

            function tryFetch() {
                attempts++;
                fetchUrl(url, function(error, htmlText) {
                    if (error) {
                        if (attempts < maxRetries) {
                            setTimeout(tryFetch, 1000);
                        } else {
                            callback(error, null);
                        }
                        return;
                    }

                    try {
                        var doc;
                        if (window.DOMParser) {
                            doc = new DOMParser().parseFromString(htmlText, "text/html");
                        } else {
                            doc = document.createElement("div");
                            doc.innerHTML = htmlText;
                        }

                        var reader = new Readability(doc);
                        var extractedArticle = reader.parse();

                        if (extractedArticle) {
                            callback(null, extractedArticle);
                        } else {
                            if (attempts < maxRetries) {
                                setTimeout(tryFetch, 1000);
                            } else {
                                callback(new Error("Readability could not parse article"), null);
                            }
                        }
                    } catch (e) {
                        if (attempts < maxRetries) {
                            setTimeout(tryFetch, 1000);
                        } else {
                            callback(e, null);
                        }
                    }
                });
            }

            tryFetch();
        }

        // Start article selection process

            try {

        // Add selection buttons to an article item
        function addSelectionButtonsToArticle(articleItem, index) {
            // Check if buttons already exist
            var existing = articleItem.querySelector(".article-selection-buttons");
            if (existing) return;

            var buttonsDiv = document.createElement("div");
            buttonsDiv.className = "article-selection-buttons";

            var chooseBtn = document.createElement("button");
            chooseBtn.textContent = "Choose";
            chooseBtn.className = "primary";
            chooseBtn.onclick = function(e) {
                e.stopPropagation();
                toggleArticleSelection(index, articleItem, true);
            };

            var skipBtn = document.createElement("button");
            skipBtn.textContent = "Skip";
            skipBtn.className = "secondary";
            skipBtn.onclick = function(e) {
                e.stopPropagation();
                toggleArticleSelection(index, articleItem, false);
            };

            buttonsDiv.appendChild(chooseBtn);
            buttonsDiv.appendChild(skipBtn);
            articleItem.appendChild(buttonsDiv);
        }

        // Toggle article selection
        function toggleArticleSelection(index, articleItem, select) {
            if (select) {
                articleSelectionState.selectedIndices.add(index);
                addClass(articleItem, "selected");
                removeClass(articleItem, "skipped");
            } else {
                articleSelectionState.selectedIndices.delete(index);
                removeClass(articleItem, "selected");
                addClass(articleItem, "skipped");
            }
            updateSelectionCounter();
        }

        // Update selection counter
        function updateSelectionCounter() {
            setText(document.getElementById("selection-count"), articleSelectionState.selectedIndices.size);
        }

        // Cancel article selection
        function cancelArticleSelection() {
            // Remove selection buttons from all articles
            var articleList = document.getElementById("article-list");
            var items = articleList.getElementsByTagName("li");

            for (var i = 0; i < items.length; i++) {
                var buttons = items[i].querySelector(".article-selection-buttons");
                if (buttons) {
                    buttons.remove();
                }
                removeClass(items[i], "selected");
                removeClass(items[i], "skipped");

            // Reset state

                downloadType: null,
                selectedIndices: new Set(),

            document.getElementById("normal-nav-buttons").style.display = "flex";

                            allArticlesHtml.push("<p><em>" + escapeHtml(article.pubDate) + "</em></p>");
                        }
                        allArticlesHtml.push("<p><a href=\"" + escapeHtml(article.link) + "\">Original Article</a></p>");

                        if (error) {
                            allArticlesHtml.push("<p><strong>[Failed to fetch full article after 3 attempts]</strong></p>");
                            allArticlesHtml.push(article.content || article.description || "");
                        } else {
                            allArticlesHtml.push(extractedArticle.content);
                            processedCount++;
                        }

                        allArticlesHtml.push("<hr/>");
                        processNextArticle(index + 1);
                    });
                }

                processNextArticle(0);
            } catch (e) {
                alert("downloadAllArticlesMobi error: " + e.message);
                addClass(document.getElementById("download-all-progress"), "hidden");
            }
        }

        function escapeHtml(text) {
            if (!text) return "";
            var div = document.createElement("div");
            setText(div, text);
            return div.innerHTML;
        }
        function generateAndDownloadEpub(article, articleHtml, commentsHtml) {
            var title = article.title || "Article";
            var filename = title.replace(/[^a-z0-9]/gi, "_") + ".epub";

            // Build XHTML content using array join for better performance
            var xhtmlParts = [
                '<?xml version="1.0" encoding="UTF-8"?>',
                '<!DOCTYPE html>',
                '<html xmlns="http://www.w3.org/1999/xhtml">',
                '<head><title>',
                escapeHtml(title),
                '</title></head>',
                '<body>',
                '<h1>',
                escapeHtml(title),
                '</h1>',
                articleHtml
            ];

            if (commentsHtml) {
                xhtmlParts.push('<hr/>');
                xhtmlParts.push('<h2>Comments</h2>');
                xhtmlParts.push(commentsHtml);
            }

            xhtmlParts.push('</body></html>');
            var xhtmlContent = xhtmlParts.join("");

            // Build OPF content
            var opfParts = [
                '<?xml version="1.0" encoding="UTF-8"?>',
                '<package xmlns="http://www.idpf.org/2007/opf" unique-identifier="BookId" version="3.0">',
                '<metadata xmlns:dc="http://purl.org/dc/elements/1.1/">',
                '<dc:title>',
                escapeHtml(title),
                '</dc:title>',
                '<dc:language>en</dc:language>',
                '<dc:identifier id="BookId">urn:uuid:',
                Date.now().toString(16),
                '</dc:identifier>',
                '<meta property="dcterms:modified">',
                new Date().toISOString().replace(/\.\d{3}Z$/, "Z"),
                '</meta>',
                '</metadata>',
                '<manifest>',
                '<item id="content" href="content.xhtml" media-type="application/xhtml+xml"/>',
                '</manifest>',
                '<spine>',
                '<itemref idref="content"/>',
                '</spine>',
                '</package>'
            ];
            var opfContent = opfParts.join("");

            // Container XML (static)
            var containerXml = '<?xml version="1.0"?><container version="1.0" xmlns="urn:oasis:names:tc:opendocument:xmlns:container"><rootfiles><rootfile full-path="OEBPS/content.opf" media-type="application/oebps-package+xml"/></rootfiles></container>';

            try {
                var zip = new JSZip();

                // Mimetype must be first and uncompressed
                zip.file("mimetype", "application/epub+zip", {compression: "STORE"});
                zip.file("META-INF/container.xml", containerXml);
                zip.file("OEBPS/content.opf", opfContent);
                zip.file("OEBPS/content.xhtml", xhtmlContent);

                zip.generateAsync({type: "blob", mimeType: "application/epub+zip"}).then(
                    function (blob) {
                        // Download the blob
                        if (typeof URL !== "undefined" && URL.createObjectURL) {
                            var url = URL.createObjectURL(blob);
                            var a = document.createElement("a");
                            a.href = url;
                            a.download = filename;
                            a.style.display = "none";
                            document.body.appendChild(a);
                            a.click();
                            document.body.removeChild(a);
                            URL.revokeObjectURL(url);
                        } else {
                            alert("EPUB download not supported in this browser");
                        }
                    },
                    function (err) {
                        alert("Error generating EPUB: " + err.message);
                    }
                );
            } catch (e) {
                alert("Error generating EPUB: " + e.message);
            }
        }

        // Attach click event to MOBI download button
        var btn = document.getElementById("download-mobi-btn");
        if (btn) {
            var generateAndDownloadMobi = function (
                article,
                articleHtml,
                commentsHtml,
            ) {
                var htmlContent =
                    "<html><body><h1>" +
                    escapeHtml(article.title) +
                    "</h1>" +
                    articleHtml;

                if (commentsHtml) {
                    htmlContent += "<hr/><h2>Comments</h2>" + commentsHtml;
                }

                htmlContent += "</body></html>";

                var title = article.title || "Article";
                var filename = title.replace(/[^a-z0-9]/gi, "_") + ".mobi";
                var feedTitle = getText(document.getElementById("feed-title")) || "RSS Reader";

                var book = new MobiBook(title, feedTitle);
                book.setHtmlContent(htmlContent);

                var writer = new MobiWriter();
                var result = writer.write(book, filename);

                if (!result.success) {
                    alert("Error generating MOBI: " + result.error);
                }
            };

            var downloadMobiHandler = function () {
                if (
                    typeof currentArticleIndex === "undefined" ||
                    currentArticleIndex < 0
                ) {
                    alert("No article selected");
                    return;
                }

                var article = currentArticles[currentArticleIndex];
                var contentDiv = document.getElementById("article-content");
                var articleHtml = contentDiv.innerHTML;

                // If there's a comments URL, fetch and include comments
                if (article.comments) {
                    fetchUrl(article.comments, function (error, htmlText) {
                        var commentsHtml = "";
                        if (!error && htmlText) {
                            try {
                                var doc;
                                if (window.DOMParser) {
                                    doc = new DOMParser().parseFromString(
                                        htmlText,
                                        "text/html",
                                    );
                                } else {
                                    doc = document.createElement("div");
                                    doc.innerHTML = htmlText;
                                }
                                var reader = new Readability(doc);
                                var parsed = reader.parse();
                                if (parsed && parsed.content) {
                                    commentsHtml = parsed.content;
                                }
                            } catch (e) {
                                // Ignore parsing errors, just skip comments
                            }
                        }
                        generateAndDownloadMobi(article, articleHtml, commentsHtml);
                    });
                } else {
                    generateAndDownloadMobi(article, articleHtml, "");
                }
            };

            if (btn.addEventListener) {
                btn.addEventListener("click", downloadMobiHandler, false);
            } else if (btn.attachEvent) {
                btn.attachEvent("onclick", downloadMobiHandler);
            }
        }

        // Attach click event to EPUB download button
        var epubBtn = document.getElementById("download-epub-btn");
        if (epubBtn) {
            var downloadEpubHandler = function () {
                if (
                    typeof currentArticleIndex === "undefined" ||
                    currentArticleIndex < 0
                ) {
                    alert("No article selected");
                    return;
                }

                var article = currentArticles[currentArticleIndex];
                var contentDiv = document.getElementById("article-content");
                var articleHtml = contentDiv.innerHTML;

                // If there's a comments URL, fetch and include comments
                if (article.comments) {
                    fetchUrl(article.comments, function (error, htmlText) {
                        var commentsHtml = "";
                        if (!error && htmlText) {
                            try {
                                var doc;
                                if (window.DOMParser) {
                                    doc = new DOMParser().parseFromString(
                                        htmlText,
                                        "text/html",
                                    );
                                } else {
                                    doc = document.createElement("div");
                                    doc.innerHTML = htmlText;
                                }
                                var reader = new Readability(doc);
                                var parsed = reader.parse();
                                if (parsed && parsed.content) {
                                    commentsHtml = parsed.content;
                                }
                            } catch (e) {
                                // Ignore parsing errors, just skip comments
                            }
                        }
                        generateAndDownloadEpub(article, articleHtml, commentsHtml);
                    });
                } else {
                    generateAndDownloadEpub(article, articleHtml, "");
                }
            };

            if (epubBtn.addEventListener) {
                epubBtn.addEventListener("click", downloadEpubHandler, false);
            } else if (epubBtn.attachEvent) {
                epubBtn.attachEvent("onclick", downloadEpubHandler);
            }
        }

        // Attach click event to View Comments button
        var viewCommentsBtn = document.getElementById("view-comments-btn");
        if (viewCommentsBtn) {
            if (viewCommentsBtn.addEventListener) {
                viewCommentsBtn.addEventListener("click", fetchComments, false);
            } else if (viewCommentsBtn.attachEvent) {
                viewCommentsBtn.attachEvent("onclick", fetchComments);
            }
        }

        // Attach click event to View Comments HTML button
        var viewCommentsHtmlBtn = document.getElementById(
            "view-comments-html-btn",
        );
        if (viewCommentsHtmlBtn) {
            if (viewCommentsHtmlBtn.addEventListener) {
                viewCommentsHtmlBtn.addEventListener(
                    "click",
                    fetchCommentsHtml,
                    false,
                );
            } else if (viewCommentsHtmlBtn.attachEvent) {
                viewCommentsHtmlBtn.attachEvent("onclick", fetchCommentsHtml);
            }
        }

        // Helper: get hash parameter (fallback for older browsers)
        function getHashParam(name) {
            var hash = window.location.hash;
            if (!hash || hash.length < 2) return null;
            hash = hash.substring(1); // Remove #
            var pairs = hash.split("&");
            for (var i = 0; i < pairs.length; i++) {
                var pair = pairs[i].split("=");
                if (decodeURIComponent(pair[0]) === name) {
                    return pair[1] ? decodeURIComponent(pair[1]) : "";
                }
            }
            return null;
        }

        // Scroll button functions
        function scrollPage(direction) {
            var scrollAmount = window.innerHeight || document.documentElement.clientHeight || 400;
            window.scrollBy(0, direction * scrollAmount * 0.8);
        }

        function updateScrollButtons() {
            var scrollTop = window.pageYOffset || document.documentElement.scrollTop || document.body.scrollTop || 0;
            var scrollHeight = document.documentElement.scrollHeight || document.body.scrollHeight;
            var clientHeight = window.innerHeight || document.documentElement.clientHeight || document.body.clientHeight;
            var scrollButtons = document.getElementById("scroll-buttons");

            // Show buttons if page is scrollable
            if (scrollHeight > clientHeight + 20) {
                removeClass(scrollButtons, "hidden");
            } else {
                addClass(scrollButtons, "hidden");
            }
        }

        // Initialize
        function init() {
            try {
                // Render saved feeds from localStorage
                renderSavedFeeds();

                var feedInput = document.getElementById("feed-url");
                if (feedInput.addEventListener) {
                    feedInput.addEventListener("keypress", function (e) {
                        var key = e.key || e.keyCode;
                        if (key === "Enter" || key === 13) {
                            loadFeed();
                        }
                    });
                } else if (feedInput.attachEvent) {
                    feedInput.attachEvent("onkeypress", function (e) {
                        if (e.keyCode === 13) {
                            loadFeed();
                        }
                    });
                }

                // Set up scroll button visibility
                updateScrollButtons();
                if (window.addEventListener) {
                    window.addEventListener("scroll", updateScrollButtons, false);
                    window.addEventListener("resize", updateScrollButtons, false);
                } else if (window.attachEvent) {
                    window.attachEvent("onscroll", updateScrollButtons);
                    window.attachEvent("onresize", updateScrollButtons);
                }

                // Populate input from URL parameter if present (check query string first, then hash)
                var feedParam = getUrlParam("feed") || getHashParam("feed");
                if (feedParam) {
                    feedInput.value = feedParam;
                    loadFeed(); // Auto-load the feed
                }
            } catch (e) {
                alert("init error: " + e.message);
            }
        }

        // Run init when DOM is ready
        try {
            if (
                document.readyState === "complete" ||
                document.readyState === "interactive"
            ) {
                init();
            } else if (document.addEventListener) {
                document.addEventListener("DOMContentLoaded", init);
            } else if (document.attachEvent) {
                document.attachEvent("onreadystatechange", function () {
                    if (document.readyState === "complete") {
                        init();
                    }
                });
            }
        } catch (e) {
            alert("Startup error: " + e.message);
        }
    </script>
</body>
